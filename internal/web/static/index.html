<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<title>secretstash: share a secret</title><link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
  <h1 class="brand"><a href="/" aria-label="secretstash"><span class="word">secret<span class="accent">stash</span></span></a></h1>
  <p class="tagline">Share a secret with a one-time link. It self-destructs after it's read.</p>

  <div id="create" class="panel">
    <label for="secret">Secret</label>
    <textarea id="secret" placeholder="Paste the secret to share…" autofocus></textarea>
    <div class="row">
      <div>
        <label for="ttl">Expires after</label>
        <select id="ttl">
          <option value="30m">30 minutes</option>
          <option value="1h">1 hour</option>
          <option value="24h" selected>24 hours</option>
          <option value="72h">3 days</option>
          <option value="168h">7 days</option>
        </select>
      </div>
      <div>
        <label for="reads">Allowed reads</label>
        <select id="reads">
          <option value="1" selected>1 (burn after reading)</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="5">5</option>
          <option value="10">10</option>
        </select>
      </div>
    </div>
    <button id="wrap">Create one-time link</button>
    <p id="create-error" class="banner warn hidden"></p>
  </div>

  <div id="result" class="panel hidden">
    <p class="banner warn">This link is shown <strong>once</strong>. The server cannot recover it, so copy it now.</p>
    <label>Share link</label>
    <div class="copyfield">
      <input id="share-url" readonly>
      <button data-copy="share-url">Copy</button>
    </div>
    <label>Token (for CLI / API use)</label>
    <div class="copyfield">
      <input id="token" readonly>
      <button data-copy="token">Copy</button>
    </div>
    <p id="result-meta" class="meta"></p>
    <button id="again" class="secondary">Share another secret</button>
  </div>
</main>
<script src="/static/app.js"></script>
</body>
</html>
